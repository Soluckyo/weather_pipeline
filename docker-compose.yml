version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: weather_postgres
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
  # ports:
  #   - "5432:5432"

  weather_pipeline:
    build: .
    container_name: weather_pipeline
    depends_on:
      - postgres
    env_file:
      - .env
    command: python main.py

volumes:
  postgres_data: